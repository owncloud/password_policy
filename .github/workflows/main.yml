name: CI

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: password_policy
  PHP_VERSIONS: '["8.3"]'

jobs:
  get-vars:
    runs-on: ubuntu-latest
    outputs:
      app-name: ${{ env.APP_NAME }}
      php-versions: ${{ env.PHP_VERSIONS }}
    steps:
      - name: Set variables
        run: |
          echo "App name $APP_NAME"
          echo "PHP versions string: $PHP_VERSIONS"

  semantic-git-messages:
    name: Commits
    uses: owncloud/reusable-workflows/.github/workflows/semantic-git-message.yml@main

  php-code-style:
    name: PHP Code Style
    needs:
      - get-vars
    uses: owncloud/reusable-workflows/.github/workflows/php-codestyle.yml@main
    with:
      app-name: ${{ needs.get-vars.outputs.app-name }}
      php-versions: ${{ needs.get-vars.outputs.php-versions }}

  php-unit:
    name: PHP Unit
    needs:
      - get-vars
    uses: owncloud/reusable-workflows/.github/workflows/php-unit.yml@main
    with:
      app-name: ${{ needs.get-vars.outputs.app-name }}
      php-versions: ${{ needs.get-vars.outputs.php-versions }}

  acceptance-api:
    name: API acceptance tests
    needs:
      - get-vars
    uses: owncloud/reusable-workflows/.github/workflows/acceptance.yml@main
    with:
      app-name: ${{ needs.get-vars.outputs.app-name }}
      do-api-tests: true
      test-suites: "['apiPasswordAddUser', 'apiPasswordAddUserSpecial', 'apiPasswordChange', 'apiPasswordChangeSpecial', 'apiUpdateShare']"

  acceptance-api-guests:
    name: API acceptance tests with guests app
    needs:
      - get-vars
    uses: owncloud/reusable-workflows/.github/workflows/acceptance.yml@main
    with:
      app-name: ${{ needs.get-vars.outputs.app-name }}
      do-api-tests: true
      use-email-server: true
      additional-app: 'guests'
      test-suites: "['apiGuests']"

  acceptance-cli:
    name: CLI acceptance tests
    needs:
      - get-vars
    uses: owncloud/reusable-workflows/.github/workflows/acceptance.yml@main
    with:
      app-name: ${{ needs.get-vars.outputs.app-name }}
      do-cli-tests: true
      test-suites: "['cliPasswordAddUser', 'cliPasswordChange', 'cliPasswordExpire']"

  acceptance-webui-email:
    name: WebUI acceptance tests with email
    needs:
      - get-vars
    uses: owncloud/reusable-workflows/.github/workflows/acceptance.yml@main
    with:
      app-name: ${{ needs.get-vars.outputs.app-name }}
      do-webui-tests: true
      use-email-server: true
      test-suites: "['webUIPasswordAddUser', 'webUIPasswordAddUserSpecial', 'webUIPasswordReset']"

  acceptance-webui:
    name: WebUI acceptance tests
    needs:
      - get-vars
    uses: owncloud/reusable-workflows/.github/workflows/acceptance.yml@main
    with:
      app-name: ${{ needs.get-vars.outputs.app-name }}
      do-webui-tests: true
      test-suites: "['webUIPasswordChange', 'webUIPasswordChangeSpecial', 'webUIPasswordPolicySettings', 'webUIPublicShareLink', 'webUIPasswordChangeUsersPage', 'webUIPasswordChangeUsersPageSpecial', 'webUIPasswordExpire']"

  acceptance-webui-guests:
    name: WebUI acceptance tests with guests app
    needs:
      - get-vars
    uses: owncloud/reusable-workflows/.github/workflows/acceptance.yml@main
    with:
      app-name: ${{ needs.get-vars.outputs.app-name }}
      do-webui-tests: true
      use-email-server: true
      additional-app: 'guests'
      test-suites: "['webUIGuests']"
